name: macOS CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-26
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Build macOS target
        run: |
          set -o pipefail
          xcodebuild \
            -workspace NestedList.xcworkspace \
            -scheme macOS \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build | tee xcodebuild.log

      - name: Print build errors
        if: failure()
        run: |
          echo "==== xcodebuild errors ===="
          grep -n " error: " xcodebuild.log || true

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -workspace NestedList.xcworkspace \
            -scheme macOS \
            -destination 'platform=macOS,arch=arm64' \
            -only-testing:macOSTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            test | tee unit-tests.log

      - name: Print unit test errors
        if: failure()
        run: |
          echo "==== unit test errors ===="
          grep -n " error: " unit-tests.log || true
          grep -n " failed" unit-tests.log || true
